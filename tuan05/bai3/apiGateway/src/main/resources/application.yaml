spring:
  application:
    name: apiGateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service-route
              uri: http://localhost:8081
              predicates:
                - Path=/orders/**
            - id: payment-service-route
              uri: http://localhost:8082
              predicates:
                - Path=/payments/**
            - id: shipping-service-route
              uri: http://localhost:8083
              predicates:
                - Path=/shippings/**

server:
  port: 8080
